; PlatformIO Project Configuration File — drone monitoring node.
; See docs/IMPLEMENTATION_PLAN.md §9 (build flags) and §10/D6 (repo layout).
; The ground-node firmware lives in the separate aqm-ground-station repo.

[env:drone]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -O2
    -Wall
    -Wextra
    -DNODE_DRONE
build_unflags = -Os
